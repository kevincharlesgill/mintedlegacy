<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — MintedLegacy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#0d1117;--darker:#080b10;--accent:#708090;--accent-light:#8a9aaa;
  --white:#fff;--green:#0faf6d;--red:#e05555;--border:rgba(112,128,144,0.2);
}
body{font-family:'DM Sans',sans-serif;background:var(--darker);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:var(--dark);}
.nav-logo{font-size:1.3rem;font-weight:600;letter-spacing:-.02em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-link{color:var(--accent-light);text-decoration:none;font-size:.9rem;}
.nav-link:hover{color:var(--white);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;}
.card{background:var(--dark);border:1px solid var(--border);border-radius:16px;padding:2.8rem 2.5rem;width:100%;max-width:460px;}
.card-header{text-align:center;margin-bottom:2rem;}
.card-header h1{font-size:1.8rem;font-weight:600;letter-spacing:-.03em;margin-bottom:.4rem;}
.card-header p{color:var(--accent-light);font-size:.95rem;}
.form-group{margin-bottom:1.3rem;}
label{display:block;font-size:.85rem;font-weight:500;color:var(--accent-light);margin-bottom:.5rem;letter-spacing:.03em;text-transform:uppercase;}
input{width:100%;padding:.85rem 1rem;background:var(--darker);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.95rem;transition:border-color .2s;}
input:focus{outline:none;border-color:var(--accent);}
input::placeholder{color:rgba(255,255,255,.25);}
.btn{width:100%;padding:1rem;background:var(--accent);color:var(--white);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;margin-top:.5rem;}
.btn:hover{background:var(--accent-light);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.divider{text-align:center;color:var(--accent);font-size:.85rem;margin:1.5rem 0;}
.login-link{text-align:center;font-size:.9rem;color:var(--accent-light);}
.login-link a{color:var(--white);font-weight:500;text-decoration:none;border-bottom:1px solid var(--accent);}
.msg{padding:.8rem 1rem;border-radius:8px;font-size:.9rem;margin-bottom:1rem;display:none;}
.msg.error{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.3);color:#f88;}
.msg.success{background:rgba(15,175,109,.1);border:1px solid rgba(15,175,109,.3);color:var(--green);}
.msg.show{display:block;}
.terms-box{display:flex;align-items:flex-start;gap:.8rem;padding:1rem;background:rgba(112,128,144,.05);border:1px solid rgba(112,128,144,.2);border-radius:8px;}
.terms-box input[type="checkbox"]{width:18px;height:18px;min-width:18px;margin-top:2px;cursor:pointer;accent-color:#708090;}
.terms-box label{font-size:.85rem;color:rgba(255,255,255,.7);line-height:1.6;cursor:pointer;text-transform:none;letter-spacing:0;}
.terms-box label a{color:#8a9aaa;border-bottom:1px solid rgba(112,128,144,.4);text-decoration:none;}
footer{background:var(--dark);color:rgba(255,255,255,.4);padding:2rem;text-align:center;font-size:.82rem;border-top:1px solid rgba(112,128,144,.15);}
footer a{color:rgba(255,255,255,.4);text-decoration:none;margin:0 .6rem;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Minted<span>Legacy</span></a>
  <a href="login.html" class="nav-link">Already a member? Sign in →</a>
</nav>
<main>
  <div class="card">
    <div class="card-header">
      <h1>Create Your Account</h1>
      <p>Join MintedLegacy and start building your branded crypto currency.</p>
    </div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="full_name" placeholder="Your full name" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <div class="terms-box">
        <input type="checkbox" id="termsCheck" onchange="toggleBtn()"/>
        <label for="termsCheck">I have read and agree to the MintedLegacy <a href="terms.html" target="_blank">Terms &amp; Conditions</a>, including all risk disclosures and disclaimers. I understand that cryptocurrency involves substantial financial risk and that MintedLegacy bears no responsibility for any losses, outcomes, or third-party services.</label>
      </div>
    </div>
    <button class="btn" id="registerBtn" onclick="register()" disabled style="opacity:.45;cursor:not-allowed;">Create My Account</button>
    <div class="divider">— or —</div>
    <div class="login-link">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</main>
<footer>
  <div style="margin-bottom:.5rem;">Minted<span style="color:#708090;">Legacy</span></div>
  <div><a href="index.html">Home</a><a href="terms.html">Terms</a><a href="privacy.html">Privacy</a></div>
  <div style="margin-top:.5rem;">© 2026 MintedLegacy. For informational purposes only.</div>
</footer>

<script>
const SUPA_URL = 'https://ajmvusgiepxmkgpkzvtd.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbXZ1c2dpZXB4bWtncGt6dnRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDIyNDMsImV4cCI6MjA5NDI3ODI0M30.YSCU_Oh5cWUa3LVUWfnnD23RfXsoG_Mxa-YVuR3_Rho';

function showMsg(text, type){
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg show ' + type;
}

function toggleBtn(){
  var checked = document.getElementById('termsCheck').checked;
  var btn = document.getElementById('registerBtn');
  btn.disabled = !checked;
  btn.style.opacity = checked ? '1' : '.45';
  btn.style.cursor = checked ? 'pointer' : 'not-allowed';
}

async function register(){
  var full_name = document.getElementById('full_name').value.trim();
  var email     = document.getElementById('email').value.trim();
  var password  = document.getElementById('password').value;
  var confirm   = document.getElementById('confirm').value;
  var btn       = document.getElementById('registerBtn');

  if(!full_name || !email || !password || !confirm){
    showMsg('Please fill in all fields.', 'error'); return;
  }
  if(password !== confirm){
    showMsg('Passwords do not match.', 'error'); return;
  }
  if(password.length < 6){
    showMsg('Password must be at least 6 characters.', 'error'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    // Step 1 — Sign up with Supabase Auth
    var res = await fetch(SUPA_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SUPA_KEY},
      body: JSON.stringify({email: email, password: password})
    });
    var data = await res.json();

    if(data.error || !data.user){
      showMsg(data.error?.message || 'Registration failed. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Create My Account'; return;
    }

    var userId = data.user.id;
    var token  = data.access_token || '';

    // Step 2 — Create profile row only if we have a real access token
    if(token){
      try{
        var profileRes = await fetch(SUPA_URL + '/rest/v1/profiles?on_conflict=id', {
          method: 'POST',
          headers:{
            'Content-Type':'application/json',
            'apikey':SUPA_KEY,
            'Authorization': 'Bearer ' + token,
            'Prefer':'resolution=merge-duplicates,return=minimal'
          },
          body: JSON.stringify({id: userId, email: email, full_name: full_name})
        });
        if(!profileRes.ok && profileRes.status !== 201 && profileRes.status !== 204){
          var profileErr = '';
          try{ profileErr = await profileRes.text(); } catch(e2){}
          console.warn('Profile insert failed:', profileRes.status, profileErr);
        }
      } catch(e2){ console.warn('Profile insert error:', e2.message); }
    }

    // Step 3 — Save session
    localStorage.setItem('ml_token', token);
    localStorage.setItem('ml_refresh', data.refresh_token || '');
    localStorage.setItem('ml_user', JSON.stringify({id: userId, email: email, full_name: full_name}));

    showMsg('Account created! Taking you to your dashboard...', 'success');
    setTimeout(function(){ window.location.href = 'dashboard.html'; }, 1500);

  } catch(e){
    showMsg('Something went wrong. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Create My Account';
  }
}

document.addEventListener('keydown', function(e){ if(e.key === 'Enter') register(); });
</script>
</body>
</html>
