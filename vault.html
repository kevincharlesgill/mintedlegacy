*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#0d1117;
  --darker:#080b10;
  --accent:#708090;
  --accent-light:#8a9aaa;
  --white:#fff;
  --green:#0faf6d;
  --border:rgba(112,128,144,0.2);
  --card:#111720;
  --locked:rgba(112,128,144,0.05);
}
body{font-family:'DM Sans',sans-serif;background:var(--darker);color:var(--white);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:1.3rem;font-weight:600;letter-spacing:-.02em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:1.2rem;}
.nav-user{font-size:.9rem;color:var(--accent-light);}
.btn-nav{padding:.5rem 1.2rem;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--accent-light);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.btn-nav:hover{border-color:var(--accent);color:var(--white);}
.container{max-width:1040px;margin:0 auto;padding:2.5rem 1.5rem;}
/* HEADER */
.vault-header{margin-bottom:2rem;}
.vault-header h1{font-size:2rem;font-weight:600;letter-spacing:-.03em;margin-bottom:.3rem;}
.vault-header p{color:var(--accent-light);}
/* PROFILE BANNER */
.profile-banner{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.profile-fields{display:flex;flex-wrap:wrap;gap:.6rem 1.5rem;}
.pf{font-size:.85rem;color:var(--accent-light);}
.pf strong{color:var(--white);}
.pf-empty{color:rgba(255,255,255,.25);font-style:italic;}
/* TIER NOTICE */
.tier-notice{background:rgba(112,128,144,.08);border:1px solid var(--border);border-radius:10px;padding:1rem 1.3rem;margin-bottom:2rem;font-size:.9rem;color:var(--accent-light);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem;}
.tier-badge{padding:.3rem .8rem;border-radius:20px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.tier-starter{background:rgba(112,128,144,.15);color:var(--accent-light);}
.tier-builder{background:rgba(15,175,109,.1);color:var(--green);}
.tier-launch{background:rgba(255,200,50,.1);color:#ffd050;}
/* GRID */
.vault-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;}
/* ASSET CARD */
.asset-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:border-color .2s,transform .2s;position:relative;}
.asset-card:hover:not(.locked){border-color:var(--accent);transform:translateY(-2px);}
.asset-card.locked{opacity:.45;cursor:not-allowed;}
.asset-icon{font-size:1.8rem;margin-bottom:.8rem;}
.asset-title{font-weight:600;font-size:1rem;margin-bottom:.35rem;}
.asset-desc{font-size:.83rem;color:var(--accent-light);line-height:1.5;margin-bottom:1.1rem;}
.asset-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
.tag{font-size:.7rem;padding:.2rem .6rem;border-radius:20px;background:rgba(112,128,144,.12);color:var(--accent-light);}
.btn-download{width:100%;padding:.7rem;background:var(--accent);color:var(--white);border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-download:hover{background:var(--accent-light);}
.lock-label{width:100%;padding:.7rem;background:rgba(112,128,144,.1);color:var(--accent);border:1px solid var(--border);border-radius:7px;font-size:.85rem;font-weight:500;text-align:center;}
.lock-icon{position:absolute;top:1rem;right:1rem;font-size:1rem;opacity:.4;}
/* SECTION DIVIDER */
.section-label{font-size:.8rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
</style>

const SUPABASE_URL_V = SUPABASE_URL;
let profile = {};
let userTier = 'starter';
let currentUser = null;
let currentToken = null;

function p(field){
  const val = profile[field];
  return (val && val.toString().trim()) ? val : `[${field.replace(/_/g,' ')}]`;
}

async function init(){
  const token = localStorage.getItem('ml_token');
  const user = JSON.parse(localStorage.getItem('ml_user') || 'null');
  if(!token || !user){ window.location.href = 'login.html'; return; }
  currentToken = token;
  currentUser = user;
  document.getElementById('navUser').textContent = user.username || user.email;
  await loadProfile();
  renderVault();
}

async function loadProfile(){
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}&select=*`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+currentToken}
    });
    const data = await res.json();
    if(data && data[0]){
      profile = data[0];
      userTier = profile.tier || 'starter';
    }
  } catch(e){ console.error(e); }
  renderProfileBanner();
  renderTierNotice();
}

function renderProfileBanner(){
  const fields = document.getElementById('profileFields');
  const show = [
    ['full_name','Name'],['coin_name','Coin'],['coin_ticker','Ticker'],['blockchain','Chain'],['website_url','Site']
  ];
  fields.innerHTML = show.map(([key,label])=>{
    const val = profile[key];
    return `<span class="pf"><strong>${label}:</strong> ${val ? val : '<span class="pf-empty">not set</span>'}</span>`;
  }).join('');
}

function renderTierNotice(){
  const limit = TIER_LIMITS[userTier] || 5;
  const badge = document.getElementById('tierBadge');
  badge.textContent = TIER_LABELS[userTier] || 'Starter';
  badge.className = 'tier-badge ' + (TIER_CLASSES[userTier] || 'tier-starter');
  document.getElementById('tierMsg').textContent = `${limit} of 16 assets unlocked`;
}

function renderVault(){
  const limit = TIER_LIMITS[userTier] || 5;
  const grid = document.getElementById('vaultGrid');

  const sections = [
    { label:'Starter — Assets 1–5', range:[1,5] },
    { label:'Builder — Assets 6–12', range:[6,12] },
    { label:'Launch Ready — Assets 13–16', range:[13,16] }
  ];

  let html = '';
  sections.forEach(sec => {
    html += `<div class="section-label">${sec.label}</div><div class="vault-grid">`;
    ASSETS.filter(a => a.id >= sec.range[0] && a.id <= sec.range[1]).forEach(asset => {
      const unlocked = asset.id <= limit;
      html += `<div class="asset-card ${unlocked ? '' : 'locked'}">
        ${!unlocked ? '<span class="lock-icon">🔒</span>' : ''}
        <div class="asset-icon">${asset.icon}</div>
        <div class="asset-title">${asset.title}</div>
        <div class="asset-desc">${asset.desc}</div>
        <div class="asset-tags">${asset.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${unlocked
          ? `<button class="btn-download" onclick="download(${asset.id})">⬇ Download</button>`
          : `<div class="lock-label">Upgrade to unlock</div>`}
      </div>`;
    });
    html += '</div>';
  });
  grid.innerHTML = html;
}

function download(id){
  const asset = ASSETS.find(a => a.id === id);
  if(!asset) return;
  const content = asset.template(p);
  const blob = new Blob([content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(profile.coin_name || 'MintedLegacy').replace(/\s+/g,'_')}_${asset.title.replace(/\s+/g,'_')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function logout(){
  localStorage.removeItem('ml_token');
  localStorage.removeItem('ml_refresh');
  localStorage.removeItem('ml_user');
  window.location.href = 'login.html';
}

init();
</script>
