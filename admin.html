<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — MintedLegacy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#0d1117;
  --darker:#080b10;
  --accent:#708090;
  --accent-light:#8a9aaa;
  --white:#fff;
  --green:#0faf6d;
  --red:#e05555;
  --border:rgba(112,128,144,0.2);
  --card:#111720;
}
body{font-family:'DM Sans',sans-serif;background:var(--darker);color:var(--white);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2.5rem;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:100;}
.nav-logo{font-size:1.3rem;font-weight:600;letter-spacing:-.02em;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.admin-badge{font-size:.75rem;background:rgba(255,200,50,.15);color:#ffd050;border:1px solid rgba(255,200,50,.3);padding:.2rem .7rem;border-radius:20px;font-weight:600;letter-spacing:.05em;}
.btn-nav{padding:.5rem 1.2rem;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--accent-light);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.btn-nav:hover{border-color:var(--accent);color:var(--white);}
.container{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem;}
.page-header{margin-bottom:2rem;}
.page-header h1{font-size:2rem;font-weight:600;letter-spacing:-.03em;margin-bottom:.3rem;}
.page-header p{color:var(--accent-light);}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem 1.5rem;}
.stat-label{font-size:.78rem;color:var(--accent-light);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;}
.stat-value{font-size:1.8rem;font-weight:600;}
/* TABLE */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.table-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.table-header h2{font-size:1rem;font-weight:600;}
.search-input{padding:.55rem 1rem;background:var(--darker);border:1px solid var(--border);border-radius:7px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.88rem;width:220px;}
.search-input:focus{outline:none;border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:.9rem 1.2rem;font-size:.75rem;font-weight:600;color:var(--accent-light);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
td{padding:.9rem 1.2rem;font-size:.88rem;border-bottom:1px solid rgba(112,128,144,.08);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(112,128,144,.04);}
.tier-select{padding:.3rem .6rem;background:var(--darker);border:1px solid var(--border);border-radius:5px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;}
.tier-select:focus{outline:none;border-color:var(--accent);}
.tier-badge{padding:.25rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.tier-starter{background:rgba(112,128,144,.15);color:var(--accent-light);}
.tier-builder{background:rgba(15,175,109,.1);color:var(--green);}
.tier-launch{background:rgba(255,200,50,.1);color:#ffd050;}
.save-btn{padding:.3rem .8rem;background:var(--accent);color:var(--white);border:none;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:background .2s;}
.save-btn:hover{background:var(--accent-light);}
.saved-dot{color:var(--green);font-size:.8rem;opacity:0;transition:opacity .3s;}
.saved-dot.show{opacity:1;}
.empty-state{text-align:center;padding:3rem;color:var(--accent-light);}
.loading{text-align:center;padding:2rem;color:var(--accent-light);}
/* ACCESS DENIED */
.denied{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:1rem;text-align:center;}
.denied h2{font-size:1.5rem;}
.denied p{color:var(--accent-light);}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Minted<span>Legacy</span></a>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span class="admin-badge">ADMIN</span>
    <button class="btn-nav" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="container" id="mainContent">
  <div class="loading">Loading...</div>
</div>

<script>
const SUPABASE_URL = 'https://ajmvusgiepxmkgpkzvtd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqbXZ1c2dpZXB4bWtncGt6dnRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MDIyNDMsImV4cCI6MjA5NDI3ODI0M30.YSCU_Oh5cWUa3LVUWfnnD23RfXsoG_Mxa-YVuR3_Rho';
const ADMIN_EMAIL = 'kcgill21@yahoo.com';

let allUsers = [];
let currentToken = null;

async function init(){
  const token = localStorage.getItem('ml_token');
  const user = JSON.parse(localStorage.getItem('ml_user') || 'null');
  if(!token || !user){ window.location.href = 'login.html'; return; }
  currentToken = token;

  // Verify admin
  if(user.email !== ADMIN_EMAIL){
    document.getElementById('mainContent').innerHTML = `
      <div class="denied">
        <h2>Access Denied</h2>
        <p>This page is only accessible to the site administrator.</p>
        <a href="dashboard.html" class="btn-nav">Go to My Dashboard</a>
      </div>`;
    return;
  }

  await loadUsers();
  renderPage();
}

async function loadUsers(){
  try {
    // Service role needed for all users — using admin token workaround via profiles
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=*&order=created_at.desc`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+currentToken}
    });
    allUsers = await res.json();
  } catch(e){ allUsers = []; }
}

function renderPage(){
  const total = allUsers.length;
  const starters = allUsers.filter(u=>(!u.tier||u.tier==='starter')).length;
  const builders = allUsers.filter(u=>u.tier==='builder').length;
  const launchers = allUsers.filter(u=>u.tier==='launch').length;

  document.getElementById('mainContent').innerHTML = `
    <div class="page-header">
      <h1>Admin Panel</h1>
      <p>Manage all MintedLegacy members and their subscription tiers.</p>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Members</div><div class="stat-value">${total}</div></div>
      <div class="stat-card"><div class="stat-label">Starter</div><div class="stat-value">${starters}</div></div>
      <div class="stat-card"><div class="stat-label">Builder</div><div class="stat-value">${builders}</div></div>
      <div class="stat-card"><div class="stat-label">Launch Ready</div><div class="stat-value">${launchers}</div></div>
    </div>
    <div class="table-card">
      <div class="table-header">
        <h2>All Members</h2>
        <input class="search-input" type="text" placeholder="Search by name or email..." oninput="filterTable(this.value)" id="searchBox"/>
      </div>
      <div style="overflow-x:auto;">
        <table id="usersTable">
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Coin</th>
              <th>Ticker</th>
              <th>Tier</th>
              <th>Joined</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            ${renderRows(allUsers)}
          </tbody>
        </table>
        ${allUsers.length === 0 ? '<div class="empty-state">No members yet. Share your registration link to get started.</div>' : ''}
      </div>
    </div>`;
}

function renderRows(users){
  if(!users.length) return '<tr><td colspan="7" style="text-align:center;color:var(--accent-light);padding:2rem;">No members found.</td></tr>';
  return users.map(u => {
    const tier = u.tier || 'starter';
    const joined = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
    return `<tr id="row-${u.id}">
      <td>${u.username || '—'}</td>
      <td>${u.email || '—'}</td>
      <td>${u.coin_name || '—'}</td>
      <td>${u.coin_ticker || '—'}</td>
      <td>
        <select class="tier-select" id="tier-${u.id}" onchange="markChanged('${u.id}')">
          <option value="starter" ${tier==='starter'?'selected':''}>Starter</option>
          <option value="builder" ${tier==='builder'?'selected':''}>Builder</option>
          <option value="launch" ${tier==='launch'?'selected':''}>Launch Ready</option>
        </select>
      </td>
      <td>${joined}</td>
      <td style="display:flex;align-items:center;gap:.6rem;">
        <button class="save-btn" onclick="saveTier('${u.id}')">Save</button>
        <span class="saved-dot" id="saved-${u.id}">✓ Saved</span>
      </td>
    </tr>`;
  }).join('');
}

function markChanged(id){
  // Optional: highlight changed row
}

async function saveTier(userId){
  const select = document.getElementById(`tier-${userId}`);
  const newTier = select.value;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
      method:'PATCH',
      headers:{
        'Content-Type':'application/json',
        'apikey':SUPABASE_KEY,
        'Authorization':'Bearer '+currentToken,
        'Prefer':'return=minimal'
      },
      body: JSON.stringify({tier: newTier})
    });
    if(res.ok){
      const dot = document.getElementById(`saved-${userId}`);
      dot.classList.add('show');
      setTimeout(()=> dot.classList.remove('show'), 2500);
      // Update local data
      const u = allUsers.find(u=>u.id===userId);
      if(u) u.tier = newTier;
    } else { alert('Failed to save. Please try again.'); }
  } catch(e){ alert('Something went wrong.'); }
}

function filterTable(query){
  const q = query.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.username||'').toLowerCase().includes(q) ||
    (u.email||'').toLowerCase().includes(q) ||
    (u.coin_name||'').toLowerCase().includes(q)
  );
  document.getElementById('tableBody').innerHTML = renderRows(filtered);
}

function logout(){
  localStorage.removeItem('ml_token');
  localStorage.removeItem('ml_refresh');
  localStorage.removeItem('ml_user');
  window.location.href = 'login.html';
}

init();
</script>

</body>
</html>
